<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parking Management System - Version 3</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 95%;
      max-width: 1200px;
      margin: 30px auto;
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.12);
    }

    h1, h2, h3 {
      text-align: center;
      color: #333;
    }

    .form-section {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-top: 25px;
    }

    .box {
      background: #fafafa;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      color: #333;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .exit-btn {
      background: #dc3545;
    }

    .exit-btn:hover {
      background: #b02a37;
    }

    .view-btn {
      background: #28a745;
    }

    .view-btn:hover {
      background: #1f7d34;
    }

    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      display: none;
      font-weight: bold;
      text-align: center;
    }

    .success {
      background: #d4edda;
      color: #155724;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
    }

    .summary-box {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 30px;
    }

    .summary-card {
      background: #eef5ff;
      border: 1px solid #cfe2ff;
      padding: 18px;
      border-radius: 10px;
      text-align: center;
    }

    .summary-card h3 {
      margin: 0;
      font-size: 18px;
      color: #333;
    }

    .summary-card p {
      font-size: 24px;
      font-weight: bold;
      margin: 10px 0 0;
      color: #007bff;
    }

    .table-section {
      margin-top: 30px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    table, th, td {
      border: 1px solid #ccc;
    }

    th, td {
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #007bff;
      color: white;
    }

    .status-parked {
      color: green;
      font-weight: bold;
    }

    .status-exited {
      color: red;
      font-weight: bold;
    }

    .no-records {
      text-align: center;
      color: #666;
      margin-top: 15px;
      font-weight: bold;
    }

    @media (max-width: 900px) {
      .form-section {
        grid-template-columns: 1fr;
      }

      .summary-box {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Parking Management System - Version 3</h1>

    <div class="form-section">

      <!-- Add Vehicle -->
      <div class="box">
        <h3>Add Vehicle Entry</h3>
        <form id="entryForm">
          <label for="vehicleNumber">Vehicle Number</label>
          <input type="text" id="vehicleNumber" placeholder="Enter vehicle number" required>

          <label for="ownerName">Owner Name</label>
          <input type="text" id="ownerName" placeholder="Enter owner name" required>

          <label for="vehicleType">Vehicle Type</label>
          <select id="vehicleType" required>
            <option value="">Select vehicle type</option>
            <option value="Car">Car</option>
            <option value="Bike">Bike</option>
            <option value="Truck">Truck</option>
          </select>

          <label for="slotNumber">Slot Number</label>
          <input type="text" id="slotNumber" placeholder="Enter slot number" required>

          <button type="submit">Record Entry</button>
        </form>
        <div id="entryMessage" class="message"></div>
      </div>

      <!-- Exit Vehicle -->
      <div class="box">
        <h3>Exit Vehicle</h3>
        <form id="exitForm">
          <label for="exitVehicleNumber">Vehicle Number</label>
          <input type="text" id="exitVehicleNumber" placeholder="Enter vehicle number" required>

          <button type="submit" class="exit-btn">Record Exit</button>
        </form>
        <div id="exitMessage" class="message"></div>
      </div>

      <!-- View Records -->
      <div class="box">
        <h3>View Records</h3>
        <label for="searchVehicle">Search by Vehicle Number</label>
        <input type="text" id="searchVehicle" placeholder="Enter vehicle number">

        <button type="button" class="view-btn" onclick="searchRecords()">Search Record</button>
        <button type="button" class="view-btn" onclick="showAllRecords()">Show All Records</button>
      </div>
    </div>

    <!-- Summary -->
    <div class="summary-box">
      <div class="summary-card">
        <h3>Total Records</h3>
        <p id="totalRecords">0</p>
      </div>
      <div class="summary-card">
        <h3>Currently Parked</h3>
        <p id="parkedCount">0</p>
      </div>
      <div class="summary-card">
        <h3>Exited Vehicles</h3>
        <p id="exitedCount">0</p>
      </div>
    </div>

    <!-- Table -->
    <div class="table-section">
      <h2>Parking History</h2>
      <table id="vehicleTable">
        <thead>
          <tr>
            <th>S.No</th>
            <th>Vehicle Number</th>
            <th>Owner Name</th>
            <th>Vehicle Type</th>
            <th>Slot Number</th>
            <th>Entry Time</th>
            <th>Exit Time</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <p id="noRecordsMessage" class="no-records" style="display: none;">No records found.</p>
    </div>
  </div>

  <script>
    const entryForm = document.getElementById("entryForm");
    const exitForm = document.getElementById("exitForm");
    const tableBody = document.querySelector("#vehicleTable tbody");
    const entryMessage = document.getElementById("entryMessage");
    const exitMessage = document.getElementById("exitMessage");

    let vehicleRecords = [];

    entryForm.addEventListener("submit", function(event) {
      event.preventDefault();

      const vehicleNumber = document.getElementById("vehicleNumber").value.trim().toUpperCase();
      const ownerName = document.getElementById("ownerName").value.trim();
      const vehicleType = document.getElementById("vehicleType").value;
      const slotNumber = document.getElementById("slotNumber").value.trim().toUpperCase();
      const entryTime = new Date().toLocaleString();

      const existingVehicle = vehicleRecords.find(
        v => v.vehicleNumber === vehicleNumber && v.status === "Parked"
      );

      if (existingVehicle) {
        showMessage(entryMessage, "This vehicle is already parked.", "error");
        return;
      }

      const vehicle = {
        vehicleNumber,
        ownerName,
        vehicleType,
        slotNumber,
        entryTime,
        exitTime: "-",
        status: "Parked"
      };

      vehicleRecords.push(vehicle);
      updateTable(vehicleRecords);
      updateSummary();
      showMessage(entryMessage, "Vehicle entry recorded successfully.", "success");
      entryForm.reset();
    });

    exitForm.addEventListener("submit", function(event) {
      event.preventDefault();

      const exitVehicleNumber = document.getElementById("exitVehicleNumber").value.trim().toUpperCase();

      const vehicle = vehicleRecords.find(
        v => v.vehicleNumber === exitVehicleNumber && v.status === "Parked"
      );

      if (vehicle) {
        vehicle.exitTime = new Date().toLocaleString();
        vehicle.status = "Exited";
        updateTable(vehicleRecords);
        updateSummary();
        showMessage(exitMessage, "Vehicle exit recorded successfully.", "success");
      } else {
        showMessage(exitMessage, "Vehicle not found or already exited.", "error");
      }

      exitForm.reset();
    });

    function updateTable(records) {
      tableBody.innerHTML = "";
      const noRecordsMessage = document.getElementById("noRecordsMessage");

      if (records.length === 0) {
        noRecordsMessage.style.display = "block";
        return;
      } else {
        noRecordsMessage.style.display = "none";
      }

      records.forEach((vehicle, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${vehicle.vehicleNumber}</td>
          <td>${vehicle.ownerName}</td>
          <td>${vehicle.vehicleType}</td>
          <td>${vehicle.slotNumber}</td>
          <td>${vehicle.entryTime}</td>
          <td>${vehicle.exitTime}</td>
          <td class="${vehicle.status === 'Parked' ? 'status-parked' : 'status-exited'}">
            ${vehicle.status}
          </td>
        `;

        tableBody.appendChild(row);
      });
    }

    function updateSummary() {
      document.getElementById("totalRecords").textContent = vehicleRecords.length;
      document.getElementById("parkedCount").textContent =
        vehicleRecords.filter(v => v.status === "Parked").length;
      document.getElementById("exitedCount").textContent =
        vehicleRecords.filter(v => v.status === "Exited").length;
    }

    function searchRecords() {
      const searchValue = document.getElementById("searchVehicle").value.trim().toUpperCase();

      if (searchValue === "") {
        updateTable(vehicleRecords);
        return;
      }

      const filteredRecords = vehicleRecords.filter(v =>
        v.vehicleNumber.includes(searchValue)
      );

      updateTable(filteredRecords);
    }

    function showAllRecords() {
      document.getElementById("searchVehicle").value = "";
      updateTable(vehicleRecords);
    }

    function showMessage(element, text, type) {
      element.style.display = "block";
      element.textContent = text;
      element.className = "message " + type;
    }

    updateTable(vehicleRecords);
    updateSummary();
  </script>

</body>
</html>
